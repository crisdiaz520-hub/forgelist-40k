name: Build installers

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  windows-exe:
    name: Windows EXE
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Build Windows installer
        run: npm run build:exe -- --debug

      - name: Upload Windows build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ForgeList-40K-Windows-logs
          path: |
            release/*.yml
            release/*.yaml
            release/*.blockmap
          if-no-files-found: ignore

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: ForgeList-40K-Windows
          path: release/*
          if-no-files-found: error

  android-apk:
    name: Android APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android packages
        run: |
          sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.0"

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Create Android project
        run: npm run android:init

      - name: Make Gradle executable
        run: chmod +x android/gradlew

      - name: Build APK
        run: npm run build:apk

      - name: Upload Android reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ForgeList-40K-Android-reports
          path: |
            android/app/build/reports/**
            android/build/reports/**
          if-no-files-found: ignore

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ForgeList-40K-Android-APK
          path: android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
